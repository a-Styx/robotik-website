<!DOCTYPE html>

<html>

<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wettkampfroboter 2026</title>
  <link rel="stylesheet" href="styles.css">
  
</head>

<body>
  <a class="back" href="index.html"><-Back</a><br>

  <h1 class="header">Wettkampfroboter 2026</h1><br>
  
  <div class="robo-model">
    <model-viewer id="model" alt="3d model" src="Robo26.glb"
      exposure="0.5"
      camera-controls
      touch-action="pan-y"
      environment-image="legacy"
      shadow-intensity="0"
      camera-orbit="0deg 75deg auto"
      field-of-view="30deg"
      animation-name="Robo26Action"
      data-default-model="Robo26.glb"
      data-pins-model="Robo26Pins.glb">
    </model-viewer>  
  </div>

  <div class="options">
    <div class="ansicht">
      <p>
        Explosion:<br>
        <button id="playBtn">an</button><br>
        <button id="stopBtn">aus</button>
      </p>
    </div>

    <div class="pins">
      <p class="pins-menu">
        Pins:<br>
        <button id="onBtn">an</button><br>
        <button id="offBtn">aus</button>
      </p>
    </div>
  </div>

  <script type="module" src="model-viewer.min.js"></script>
  <script src="robo-model.js"></script>

</body>

</html>
